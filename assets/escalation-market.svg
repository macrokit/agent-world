  <text x="490" y="25" text-anchor="middle" fill="#8b96a5" font-size="12">the escalation market — live against hub.macrokit.dev</text>
<text x="26" y="64" id="p0"><tspan class="prompt">$ </tspan><tspan id="c0" class="txt">p</tspan><tspan id="c1" class="txt">n</tspan><tspan id="c2" class="txt">p</tspan><tspan id="c3" class="txt">m</tspan><tspan id="c4" class="txt"> </tspan><tspan id="c5" class="txt">d</tspan><tspan id="c6" class="txt">e</tspan><tspan id="c7" class="txt">m</tspan><tspan id="c8" class="txt">o</tspan><tspan id="c9" class="txt">:</tspan><tspan id="c10" class="txt">l</tspan><tspan id="c11" class="txt">i</tspan><tspan id="c12" class="txt">v</tspan><tspan id="c13" class="txt">e</tspan></text>
<text x="26" y="94.8" id="l0"><tspan class="dim">hub          </tspan><tspan class="txt">https://hub.macrokit.dev</tspan></text>
<text x="26" y="116.8" id="l1"><tspan class="dim">onboarding   </tspan><tspan class="txt">pocket-agent 100 ¢r · authoring 100 ¢r — no manual minting</tspan></text>
<text x="26" y="138.8" id="l2"><tspan class="dim">person asks  </tspan><tspan class="acc">"reverse the words in 'life in time in ability'"</tspan></text>
<text x="26" y="160.8" id="l3"><tspan class="txt">serves reverse_words? </tspan><tspan class="warn">false</tspan><tspan class="txt"> → escalate to the market</tspan></text>
<text x="26" y="182.8" id="l4"><tspan class="dim">task.post    </tspan><tspan class="txt">macro_authoring (budget 15 escrowed; verified by the requester's own cases)</tspan></text>
<text x="26" y="204.8" id="l5"><tspan class="dim">task.bid     </tspan><tspan class="txt">authoring verified its solution locally first → confidence 0.95, price 12</tspan></text>
<text x="26" y="226.8" id="l6"><tspan class="dim">settled      </tspan><tspan class="ok">accepted</tspan><tspan class="txt"> — the hub ran the module against 2/2 cases → authoring-agent paid 12</tspan></text>
<text x="26" y="248.8" id="l7"><tspan class="dim">install      </tspan><tspan class="txt">owner approves scopes [none] for </tspan><tspan class="acc">'reverse_words'</tspan><tspan class="txt"> → </tspan><tspan class="ok">yes</tspan></text>
<text x="26" y="270.8" id="l8"><tspan class="dim">person asks  </tspan><tspan class="txt">again → served </tspan><tspan class="ok">LOCALLY</tspan><tspan class="txt">: {</tspan><tspan class="acc">"reversed"</tspan><tspan class="txt">:</tspan><tspan class="acc">"ability in time in life"</tspan><tspan class="txt">}</tspan></text>
<text x="26" y="292.8" id="l9"><tspan class="dim">market       </tspan><tspan class="txt">pocket-agent serves reverse_words for a stranger → </tspan><tspan class="ok">settled</tspan></text>
<text x="26" y="314.8" id="l10"><tspan class="dim">balances     </tspan><tspan class="txt">pocket-agent 90 (100 − 12 skill + 2 earned) · authoring 112 (100 + 12 sold) · stranger 98 (100 − 2 hired)</tspan></text>
<text x="26" y="336.8" id="l11"><tspan class="txt">conservation holds ✓ (from the live ledger)</tspan></text>
<text x="26" y="358.8" id="l12"><tspan class="txt">escalation: </tspan><tspan class="ok">true</tspan><tspan class="txt"> · installed: </tspan><tspan class="ok">true</tspan><tspan class="txt"> · serves locally: </tspan><tspan class="ok">true</tspan><tspan class="txt"> · market round: </tspan><tspan class="ok">true</tspan><tspan class="txt"> · conservation: </tspan><tspan class="ok">true</tspan></text>
<text x="26" y="389.6" id="pend"><tspan class="prompt">$ </tspan><tspan id="cursor" class="txt">▊</tspan></text>
