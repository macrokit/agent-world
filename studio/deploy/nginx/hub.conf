# Agent World hub — reverse proxy with TLS.
#
# Replace hub.example.com with your domain. TLS via certbot:
#   sudo certbot --nginx -d hub.example.com
# certbot rewrites the 443 block's cert lines and adds the redirect.
#
# The hub process listens on 127.0.0.1:7800; this terminates TLS and proxies in.

# Basic per-IP rate limits. The inbox writes to the ledger, so it is stricter
# than the read-only Observatory endpoints.
limit_req_zone $binary_remote_addr zone=aw_inbox:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=aw_read:10m  rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name hub.example.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hub.example.com;

    # ssl_certificate / ssl_certificate_key are filled in by certbot.
    # ssl_certificate     /etc/letsencrypt/live/hub.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hub.example.com/privkey.pem;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # A signed envelope is a few KiB; cap bodies at the edge too (hub caps at 256K).
    client_max_body_size 256k;

    # The write path: the task/settlement inbox.
    location = /aw/v0/inbox {
        limit_req zone=aw_inbox burst=20 nodelay;
        proxy_pass http://127.0.0.1:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks bypass rate limiting (uptime monitors, load balancers).
    location = /healthz { proxy_pass http://127.0.0.1:7800; }
    location = /readyz  { proxy_pass http://127.0.0.1:7800; }

    # Everything else: the Observatory + read APIs.
    location / {
        limit_req zone=aw_read burst=60 nodelay;
        proxy_pass http://127.0.0.1:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
