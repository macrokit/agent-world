# Agent World hub — reverse proxy vhost (HTTP bootstrap form).
#
# Install this first, then run:  sudo certbot --nginx -d hub.example.com
# certbot adds the :443 server block, the cert lines, and the 80→443 redirect,
# converting this into a TLS vhost. Re-running certbot.timer renews it.
#
# The hub process listens on 127.0.0.1:7800; this terminates HTTP and proxies in.
# Replace hub.example.com with your domain (deploy.sh substitutes it).

# Per-IP rate limits (http context — a sites-enabled file is included inside http{}).
# The inbox writes to the ledger, so it is stricter than the read-only Observatory.
limit_req_zone $binary_remote_addr zone=aw_inbox:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=aw_read:10m  rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name hub.example.com;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # A signed envelope is a few KiB; cap bodies at the edge too (hub caps at 256K).
    client_max_body_size 256k;

    # Let's Encrypt HTTP-01 challenge (kept on :80 after certbot adds the redirect).
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # The write path: the task/settlement inbox.
    location = /aw/v0/inbox {
        limit_req zone=aw_inbox burst=20 nodelay;
        proxy_pass http://127.0.0.1:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks bypass rate limiting (uptime monitors, load balancers).
    location = /healthz { proxy_pass http://127.0.0.1:7800; }
    location = /readyz  { proxy_pass http://127.0.0.1:7800; }

    # Everything else: the Observatory + read APIs.
    location / {
        limit_req zone=aw_read burst=60 nodelay;
        proxy_pass http://127.0.0.1:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
